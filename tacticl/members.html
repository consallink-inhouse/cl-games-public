</head>
<body>

<div class="app">
  <!-- SIDEBAR -->
  <nav class="sidebar" id="sidebar">
    <div class="logo">
      <a href="index.html">
        <div class="logo-text">⚡ TACTICL</div>
        <div class="logo-sub">社会人サッカー戦術プラットフォーム</div>

    <div class="nav">
      <div class="nav-section">メイン</div>
      <a class="nav-item" href="index.html">
        <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg>
        ダッシュボード
      </a>
      <a class="nav-item" href="schedule.html">
        <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
        スケジュール
        <span class="nav-badge">3</span>
      </a>

      <div class="nav-section">チーム管理</div>
      <a class="nav-item" href="company.html">
        <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9,22 9,12 15,12 15,22"/></svg>
        チーム管理
      </a>
      <a class="nav-item active" href="members.html">
        <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
        メンバー管理
      </a>
      <a class="nav-item" href="formation.html">
        <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><circle cx="4" cy="8" r="2"/><circle cx="20" cy="8" r="2"/><circle cx="4" cy="18" r="2"/><circle cx="20" cy="18" r="2"/><line x1="6" y1="8" x2="9" y2="11"/><line x1="15" y1="11" x2="18" y2="8"/><line x1="6" y1="18" x2="9" y2="13"/><line x1="15" y1="13" x2="18" y2="18"/></svg>
        フォーメーション
      </a>

      <div class="nav-section">対外活動</div>
      <a class="nav-item" href="companies.html">
        <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="2" y1="12" x2="22" y2="12"/><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/></svg>
        チーム一覧
      </a>
      <a class="nav-item" href="score.html">
        <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M6 20h12"/><path d="M12 20V4"/><circle cx="5" cy="10" r="2"/><circle cx="19" cy="7" r="2"/></svg>
        試合状況
      </a>
      <a class="nav-item" href="records.html">
        <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="22,12 18,12 15,21 9,3 6,12 2,12"/></svg>
        成績管理
      </a>

      <div class="nav-section">コミュニケーション</div>
      <a class="nav-item" href="chat.html">
        <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
        チャット

      </a>

    <div class="sidebar-footer">
      <div class="company-tag">
        <div class="company-avatar">CL</div>
        <div>
          <div class="company-name">CLFC</div>
          <div class="company-plan">フリープラン</div>
        </div>
      </div>
    </div>
  </nav>

  <!-- SIDEBAR OVERLAY (mobile) -->
  <div class="sidebar-overlay" id="sidebarOverlay" onclick="closeSidebar()"></div>

  <!-- MAIN -->
  <main class="main">
    <div class="topbar">
      <button class="menu-toggle" onclick="toggleSidebar()">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/>
        </svg>
      </button>
      <img src="image/clfc_logo.png" alt="CLFC Logo" class="page-title-logo">
      <div class="page-title">メンバー管理</div>
      <div class="topbar-actions">
        <div class="notif-btn">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg>
          <div class="notif-dot"></div>
        </div>
        <button class="btn btn-primary" onclick="openModal('modal-add-member')">＋ メンバー追加</button>
      </div>
    </div>

    <div class="content">
      <div class="search-bar">
        <div class="search-input" style="position:relative">
          <span class="search-icon" style="position:absolute;left:10px;top:50%;transform:translateY(-50%)">🔍</span>
          <input type="text" placeholder="メンバーを検索..." style="padding-left:32px" id="memberSearch">
        </div>
        <select style="width:140px" id="memberPosFilter">
          <option value="">全ポジション</option>
          <option value="GK">GK</option>
          <option value="DF">DF</option>
          <option value="MF">MF</option>
          <option value="FW">FW</option>
        </select>
      </div>

      <div id="membersGrid"></div>
    </div>
  </main>
</div>

<!-- MODAL: メンバー追加 -->
<div class="modal-overlay" id="modal-add-member">
  <div class="modal">
    <div class="modal-header">
      <div class="modal-title">メンバーを追加</div>
      <div class="modal-close" onclick="closeModal('modal-add-member')">✕</div>
    </div>
    <div class="modal-body">
      <div class="form-grid">
        <div class="form-group"><label>背番号 *</label><input type="number" min="1" max="99" placeholder="10"></div>
        <div class="form-group"><label>表示名 *</label><input type="text" placeholder="例：選手名"></div>
        <div class="form-group">
          <label>ポジション</label>
          <select>
            <option>GK</option>
            <option>DF</option>
            <option>MF</option>
            <option>FW</option>
          </select>
        </div>
        <div class="form-group"><label>利き足</label><select><option>右足</option><option>左足</option><option>両足</option></select></div>
        <div class="form-group"><label>経験年数</label><input type="number" placeholder="0" min="0" max="30"></div>
        
        <div class="form-group"><label>ロール</label><select><option>一般メンバー</option><option>管理者</option><option>ゲスト</option></select></div>
        <div class="form-group full"><label>自己紹介</label><textarea placeholder="ポジションのこだわりや得意なプレーなど..."></textarea></div>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-ghost" onclick="closeModal('modal-add-member')">キャンセル</button>
      <button class="btn btn-primary" onclick="closeModal('modal-add-member')">追加する</button>
    </div>
  </div>
</div>


<!-- MODAL: メンバー編集 -->
<div class="modal-overlay" id="modal-edit-member">
  <div class="modal modal-large">
    <div class="modal-header">
      <div class="modal-title" id="editMemberTitle">メンバー編集</div>
      <div class="modal-close" onclick="closeModal('modal-edit-member')">✕</div>
    </div>
    <div class="modal-body">
      <input type="hidden" id="editMemberIdx" value="">

      <div class="edit-member-top">
        <div class="edit-member-avatar"><img id="editMemberPreview" src="" alt=""></div>
        <div class="edit-member-actions">
          <button class="btn btn-outline" type="button">📷 画像を変更</button>
          <div style="font-size:11px;color:var(--text-muted);margin-top:6px">JPG/PNG・推奨 400×400 以上</div>
        </div>
      </div>

      <div class="form-grid" style="margin-top:18px">
        <div class="form-group">
          <label>背番号 *</label>
          <input type="number" id="editMemberNumber" min="1" max="99">
        </div>
        <div class="form-group">
          <label>表示名 *</label>
          <input type="text" id="editMemberName">
        </div>
        <div class="form-group">
          <label>ポジション</label>
          <select id="editMemberPos">
            <option value="GK">GK</option>
            <option value="DF">DF</option>
            <option value="MF">MF</option>
            <option value="FW">FW</option>
          </select>
        </div>
        <div class="form-group">
          <label>詳細ポジション</label>
          <input type="text" id="editMemberPosDetail" placeholder="例: MF（右）">
        </div>
        <div class="form-group">
          <label>利き足</label>
          <select id="editMemberFoot">
            <option>右足</option>
            <option>左足</option>
            <option>両足</option>
          </select>
        </div>
        <div class="form-group">
          <label>経験年数</label>
          <input type="number" id="editMemberExp" min="0" max="40">
        </div>
        <div class="form-group">
          <label>得点（シーズン）</label>
          <input type="number" id="editMemberGoals" min="0">
        </div>
        <div class="form-group">
          <label>アシスト（シーズン）</label>
          <input type="number" id="editMemberAssists" min="0">
        </div>
        <div class="form-group full">
          <label class="checkbox-label">
            <input type="checkbox" id="editMemberAdmin"> 管理者権限を付与
          </label>
        </div>
        <div class="form-group full">
          <label>自己紹介</label>
          <textarea id="editMemberBio" placeholder="ポジションのこだわりや得意なプレーなど..."></textarea>
        </div>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-danger" style="margin-right:auto" onclick="if(confirm('このメンバーを削除しますか？')) closeModal('modal-edit-member')">削除</button>
      <button class="btn btn-ghost" onclick="closeModal('modal-edit-member')">キャンセル</button>
      <button class="btn btn-primary" onclick="closeModal('modal-edit-member')">保存する</button>
    </div>
  </div>
</div>

<script src="js/common.js"></script>
<script src="js/members.js"></script>
</body>
</html>
